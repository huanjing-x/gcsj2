version: '3.8'

# ============================================
# 代码片段管理系统 - Docker 一键部署
# ============================================

services:
  # MySQL 8 数据库
  mysql:
    image: mysql:8.0
    container_name: gcsj2-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: code_snippet_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcsj2-network

  # SpringBoot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gcsj2-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/code_snippet_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    networks:
      - gcsj2-network

  # Nginx 前端
  nginx:
    image: nginx:alpine
    container_name: gcsj2-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - gcsj2-network

volumes:
  mysql-data:

networks:
  gcsj2-network:
    driver: bridge
